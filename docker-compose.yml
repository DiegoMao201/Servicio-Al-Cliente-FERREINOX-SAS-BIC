services:
  # 1. Base de Datos (PostgreSQL, solo accesible internamente)
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ferreinox_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Solo descomenta las siguientes líneas si necesitas inicializar una base nueva:
      # - ./backend/schema_init.sql:/docker-entrypoint-initdb.d/10-schema_init.sql:ro
      # - ./backend/postgrest_views.sql:/docker-entrypoint-initdb.d/20-postgrest_views.sql:ro
      # - ./backend/postgrest_setup.sql:/docker-entrypoint-initdb.d/30-postgrest_setup.sql:ro
      # - ./backend/agent_schema.sql:/docker-entrypoint-initdb.d/40-agent_schema.sql:ro
    # No expongas el puerto 5432 a internet por seguridad

  # 2. Backend (FastAPI, WhatsApp Webhook, IA)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data:ro
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - PGRST_URL=http://postgrest:3000
      - AGENT_PROFILE=${AGENT_PROFILE}
      - APP_VERSION_LABEL=${APP_VERSION_LABEL}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
    depends_on:
      - db
    # No expongas el puerto aquí, usa Coolify para mapearlo a tu subdominio (ej: apicrm.datovatenexuspro.com)

  # 3. PostgREST (API SQL segura)
  postgrest:
    image: postgrest/postgrest:v12.2.8
    restart: always
    expose:
      - "3000"
    environment:
      PGRST_DB_URI: ${POSTGRES_DB_URI}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
    depends_on:
      - db
    # No expongas el puerto aquí, usa Coolify para mapearlo a tu subdominio (ej: postgrest.datovatenexuspro.com)

  # 4. Frontend (Streamlit, dashboard)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    command: /app/start_streamlit.sh
    expose:
      - "8501"
    # Si Coolify no te deja crear files en Storage para este stack,
    # define STREAMLIT_SECRETS_TOML como variable multilinea y este contenedor
    # generará /app/.streamlit/secrets.toml automáticamente al arrancar.
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BACKEND_URL=https://apicrm.datovatenexuspro.com
      - PGRST_URL=http://postgrest:3000
      - STREAMLIT_SECRETS_TOML=${STREAMLIT_SECRETS_TOML}
      - DROPBOX_ROTACION_APP_KEY=${DROPBOX_ROTACION_APP_KEY}
      - DROPBOX_ROTACION_APP_SECRET=${DROPBOX_ROTACION_APP_SECRET}
      - DROPBOX_ROTACION_REFRESH_TOKEN=${DROPBOX_ROTACION_REFRESH_TOKEN}
      - DROPBOX_ROTACION_FOLDER=${DROPBOX_ROTACION_FOLDER}
      - DROPBOX_CARTERA_APP_KEY=${DROPBOX_CARTERA_APP_KEY}
      - DROPBOX_CARTERA_APP_SECRET=${DROPBOX_CARTERA_APP_SECRET}
      - DROPBOX_CARTERA_REFRESH_TOKEN=${DROPBOX_CARTERA_REFRESH_TOKEN}
      - DROPBOX_CARTERA_FOLDER=${DROPBOX_CARTERA_FOLDER}
      - DROPBOX_VENTAS_APP_KEY=${DROPBOX_VENTAS_APP_KEY}
      - DROPBOX_VENTAS_APP_SECRET=${DROPBOX_VENTAS_APP_SECRET}
      - DROPBOX_VENTAS_REFRESH_TOKEN=${DROPBOX_VENTAS_REFRESH_TOKEN}
      - DROPBOX_VENTAS_FOLDER=${DROPBOX_VENTAS_FOLDER}
    depends_on:
      - backend
      - postgrest
    # No expongas el puerto aquí, usa Coolify para mapearlo a tu subdominio (ej: crm.datovatenexuspro.com)

volumes:
  postgres_data: