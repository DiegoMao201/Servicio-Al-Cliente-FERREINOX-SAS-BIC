services:
  # 1. Base de Datos (PostgreSQL, solo accesible internamente)
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ferreinox_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Solo descomenta las siguientes líneas si necesitas inicializar una base nueva:
      # - ./backend/schema_init.sql:/docker-entrypoint-initdb.d/10-schema_init.sql:ro
      # - ./backend/postgrest_views.sql:/docker-entrypoint-initdb.d/20-postgrest_views.sql:ro
      # - ./backend/postgrest_setup.sql:/docker-entrypoint-initdb.d/30-postgrest_setup.sql:ro
      # - ./backend/agent_schema.sql:/docker-entrypoint-initdb.d/40-agent_schema.sql:ro
    # No expongas el puerto 5432 a internet por seguridad

  # 2. Backend (FastAPI, WhatsApp Webhook, IA)
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/ferreinox_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PGRST_URL=http://postgrest:3000
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
    depends_on:
      - db
    # No expongas el puerto aquí, usa Coolify para mapearlo a tu subdominio (ej: apicrm.datovatenexuspro.com)

  # 3. PostgREST (API SQL segura)
  postgrest:
    image: postgrest/postgrest:v12.2.8
    restart: always
    expose:
      - "3000"
    environment:
      PGRST_DB_URI: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/ferreinox_db
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
    depends_on:
      - db
    # No expongas el puerto aquí, usa Coolify para mapearlo a tu subdominio (ej: postgrest.datovatenexuspro.com)

  # 4. Frontend (Streamlit, dashboard)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    expose:
      - "8501"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/ferreinox_db
      - BACKEND_URL=https://apicrm.datovatenexuspro.com
      - PGRST_URL=http://postgrest:3000
    depends_on:
      - backend
      - postgrest
    # No expongas el puerto aquí, usa Coolify para mapearlo a tu subdominio (ej: crm.datovatenexuspro.com)

volumes:
  postgres_data: